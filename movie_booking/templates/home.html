{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <!-- TITLE -->
    <h2 class="text-center mb-5">🎬 Now Showing</h2>

    <!-- MOVIES GRID -->
    <div class="row">

        {% for movie in movies %}
        <div class="col-md-3 mb-4">

            <div class="card movie-card h-100">

                <!-- POSTER -->
                {% if movie.poster %}
                    <img src="{{ movie.poster.url }}" class="card-img-top">
                {% else %}
                    <img src="https://dummyimage.com/300x400/cccccc/000000&text=No+Poster" class="card-img-top">
                {% endif %}

                <!-- BODY -->
                <div class="card-body text-center">

                    <h5 class="card-title">{{ movie.title }}</h5>

                    <p class="text-muted">
                        {{ movie.genre }} • {{ movie.duration }} mins
                    </p>

                    <!-- BUTTON -->
                    <a href="{% url 'movie_detail' movie.id %}" class="btn btn-primary">
                        Book Now
                    </a>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
